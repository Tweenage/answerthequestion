<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Honey background circle -->
  <circle cx="32" cy="32" r="30" fill="#fbbf24"/>
  <!-- Bee body -->
  <ellipse cx="32" cy="36" rx="14" ry="12" fill="#fcd34d"/>
  <!-- Stripes -->
  <rect x="18" y="31" width="28" height="4" rx="2" fill="#92400e"/>
  <rect x="18" y="38" width="28" height="4" rx="2" fill="#92400e"/>
  <!-- Wings -->
  <ellipse cx="22" cy="26" rx="8" ry="6" fill="white" opacity="0.7" transform="rotate(-20 22 26)"/>
  <ellipse cx="42" cy="26" rx="8" ry="6" fill="white" opacity="0.7" transform="rotate(20 42 26)"/>
  <!-- Eyes -->
  <circle cx="27" cy="30" r="2.5" fill="#1e293b"/>
  <circle cx="37" cy="30" r="2.5" fill="#1e293b"/>
  <!-- Smile -->
  <path d="M28 35 Q32 39 36 35" stroke="#92400e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Crown -->
  <polygon points="24,18 28,14 32,18 36,14 40,18 38,22 26,22" fill="#f59e0b" stroke="#d97706" stroke-width="0.5"/>
  <circle cx="28" cy="16" r="1" fill="#fbbf24"/>
  <circle cx="32" cy="14" r="1" fill="#fbbf24"/>
  <circle cx="36" cy="16" r="1" fill="#fbbf24"/>
</svg>
